<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POPKEMON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#080410; --bg-1:#11061f;
    --surface:#190a2b; --surface-2:#23103c; --line:#3d1b66;
    --magenta:#e23bff; --magenta-2:#ff2bd6; --purple:#7b2cff; --violet:#2a0a4a;
    --yellow:#ffe600; --yellow-soft:#ffd400;
    --text:#f3e6ff; --muted:#a07ccf;
    --ease:cubic-bezier(.34,1.56,.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%; touch-action:manipulation; -webkit-overflow-scrolling:touch}
  body{
    font-family:'Orbitron',sans-serif; color:var(--text);
    background:var(--bg-0); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:34px 16px 60px; overflow-x:hidden;
    user-select:none; -webkit-user-select:none;
    touch-action:manipulation; -ms-touch-action:manipulation; overscroll-behavior:none;
    font-variant-numeric:tabular-nums; letter-spacing:.5px;
  }
  /* cyberpunk atmosphere: neon glows + perspective grid floor */
  body::before{
    content:""; position:fixed; inset:0; z-index:-3;
    background:
      radial-gradient(60% 45% at 50% 6%, rgba(226,59,255,.22), transparent 70%),
      radial-gradient(55% 45% at 88% 78%, rgba(123,44,255,.20), transparent 72%),
      radial-gradient(45% 40% at 8% 70%, rgba(255,230,0,.06), transparent 70%),
      linear-gradient(180deg,var(--bg-1),var(--bg-0));
  }
  body::after{
    content:""; position:fixed; left:-20%; right:-20%; bottom:-10%; height:55%;
    z-index:-3; pointer-events:none; opacity:.35;
    background-image:
      linear-gradient(90deg, rgba(226,59,255,.5) 1px, transparent 1px),
      linear-gradient(0deg, rgba(226,59,255,.4) 1px, transparent 1px);
    background-size:42px 42px;
    transform:perspective(340px) rotateX(64deg);
    transform-origin:bottom center;
    mask-image:linear-gradient(to top, #000, transparent);
    -webkit-mask-image:linear-gradient(to top, #000, transparent);
  }
  .scan{position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply; opacity:.5}

  /* canary-yellow lightning watermark: enters off the top-right corner, sweeps down-left */
  .bg-bolt{position:fixed; top:-6vh; right:-6vw; width:90vmax; height:90vmax;
    will-change:transform;
    z-index:-2; opacity:.2; pointer-events:none}
  .bg-bolt svg{width:100%; height:100%; display:block}
  .bg-bolt path{fill:#ffef00}

  .stage{width:100%; max-width:380px; display:flex; flex-direction:column; align-items:center; position:relative}

  /* glitchy neon title */
  .title{position:relative; display:flex; justify-content:center; align-items:baseline;
    white-space:nowrap; font-weight:900; font-size:clamp(2.6rem,12vw,3.6rem);
    line-height:1; letter-spacing:3px}
  .title span{position:relative; display:inline-block}

  /* KETMON: steady magenta neon (original project vibe) */
  .t-ket{color:var(--magenta);
    text-shadow:0 0 10px rgba(226,59,255,.95), 0 0 32px rgba(123,44,255,.78), 0 0 52px rgba(226,59,255,.48)}

  /* POP: white neon, animation disabled */
  .t-pop{color:#fff;
    text-shadow:0 0 10px rgba(255,255,255,1), 0 0 28px rgba(226,59,255,.72), 0 0 46px rgba(123,44,255,.42)}
  .t-pop::before,.t-pop::after{display:none}
  .subtitle{font-size:.62rem; letter-spacing:5px; color:var(--muted); margin-top:8px}
  .credit{font-size:.52rem; letter-spacing:3px; color:#fff; opacity:.6; margin-top:5px; font-weight:400}

  /* 3rd letter P: lemon, larger, tilted 12deg — the standout accent */
  .t-bigP{
    display:inline-block; color:var(--yellow); font-size:1.3em; line-height:1;
    transform:rotate(12deg); transform-origin:50% 75%;
    margin:0 .04em 0 .02em;
    text-shadow:0 0 12px rgba(255,230,0,1), 0 0 34px rgba(255,230,0,.68), 0 0 56px rgba(226,59,255,.52);
    animation:bigPbob 2.6s ease-in-out infinite;
  }
  @keyframes bigPbob{50%{transform:rotate(12deg) translateY(-4px)}}

  /* pokeball (master-ball look) sitting in place of the O */
  .t-ball{display:inline-block; width:.92em; height:.92em; vertical-align:-.14em; margin:0 .01em}
  .t-ball::before{content:""; position:absolute; inset:16%; border-radius:50%;
    box-shadow:0 0 19px 9px rgba(226,59,255,.88),0 0 36px 15px rgba(255,230,0,.4);
    pointer-events:none}
  .t-ball svg{position:relative; width:100%; height:100%; display:block;
    transform:rotate(-6deg); backface-visibility:hidden}

  .name-row{display:flex; gap:8px; margin:18px 0 4px}
  .name-row input{padding:9px 14px; border:1.5px solid var(--line); border-radius:10px;
    background:var(--surface); color:var(--text); font:inherit; font-size:12px; outline:none;
    width:150px; letter-spacing:1px; transition:border-color .15s, box-shadow .15s}
  .name-row input::placeholder{color:var(--muted)}
  .name-row input:focus{border-color:var(--magenta); box-shadow:0 0 12px rgba(226,59,255,.5)}
  .name-row button{padding:9px 16px; border-radius:10px; cursor:pointer;
    background:var(--surface-2); color:var(--text); font:inherit; font-weight:700; font-size:12px;
    letter-spacing:1px; border:1.5px solid var(--magenta); transition:transform .12s var(--ease), box-shadow .15s}
  .name-row button:hover{box-shadow:0 0 14px rgba(226,59,255,.6)}
  .name-row button:active{transform:scale(.94)}

  .stats{display:flex; gap:10px; width:100%; margin:18px 0 6px}
  .chip{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:12px 6px; text-align:center; box-shadow:inset 0 0 16px rgba(123,44,255,.15)}
  .chip.hero{flex:1.4; border-color:var(--magenta); box-shadow:0 0 16px rgba(226,59,255,.3), inset 0 0 18px rgba(226,59,255,.12)}
  .chip .label{font-size:.52rem; letter-spacing:2px; color:var(--muted)}
  .chip .value{font-weight:900; font-size:1.4rem; margin-top:4px; line-height:1}
  .chip.hero .value{font-size:2rem; color:var(--yellow); text-shadow:0 0 14px rgba(255,230,0,.6)}

  .arena{position:relative; width:260px; height:250px; margin:12px 0 2px;
    display:flex; align-items:center; justify-content:center}
  .platform{position:absolute; bottom:16px; width:180px; height:40px; border-radius:50%;
    background:radial-gradient(closest-side, rgba(226,59,255,.5), rgba(226,59,255,0) 75%);
    opacity:.74}
  .tap-ring{position:absolute; width:200px; height:200px; border-radius:50%;
    border:2px dashed rgba(255,230,0,.5); opacity:.62; pointer-events:none}

  .mon-btn{position:relative; width:228px; height:228px; border:none; background:none;
    cursor:pointer; padding:0; outline:none; touch-action:none; -webkit-tap-highlight-color:transparent}
  .mon-btn::before{content:""; position:absolute; left:50%; bottom:24px; width:150px; height:34px;
    transform:translateX(-50%); border-radius:50%; background:rgba(0,0,0,.42);
    box-shadow:0 10px 18px rgba(0,0,0,.42), 0 0 18px rgba(226,59,255,.32);
    pointer-events:none}
  .mon-img{width:100%; height:100%; object-fit:contain;
    animation:idleFloat 3s ease-in-out infinite; transition:transform .08s var(--ease); pointer-events:none;
    will-change:transform; transform:translateZ(0); backface-visibility:hidden}
  @keyframes idleFloat{50%{transform:translate3d(0,-10px,0)}}
  .mon-btn.pop .mon-img{animation:none; transform:scale(.88) rotate(-3deg)}

  .pop-text{position:fixed; z-index:50; pointer-events:none; white-space:nowrap;
    font-weight:900; font-size:1.05rem; letter-spacing:1px; color:var(--yellow);
    text-shadow:0 0 10px rgba(255,230,0,.8); animation:popUp .7s ease-out forwards}
  @keyframes popUp{0%{opacity:1; transform:translate(-50%,0) scale(.8)}
    100%{opacity:0; transform:translate(-50%,-70px) scale(1.4)}}
  .spark{position:fixed; z-index:49; width:7px; height:7px; border-radius:50%;
    pointer-events:none; animation:spark .5s ease-out forwards}
  @keyframes spark{to{opacity:0; transform:translate(var(--dx),var(--dy)) scale(.2)}}

  /* ===== ELECTRIC CHARGE GAUGE (lightning, not a plain bar) ===== */
  .charge{position:relative; width:100%; height:46px; margin-top:20px; --empty-ratio:1; --tip-offset:-100%;
    contain:layout}
  .charge-track{position:absolute; inset:0; border-radius:12px; overflow:hidden;
    background:linear-gradient(180deg,#120623,#0c0418);
    border:1.5px solid var(--line);
    box-shadow:inset 0 0 14px rgba(123,44,255,.35)}
  .bolt-dim{position:absolute; inset:0; width:100%; height:100%; opacity:.5; z-index:3}
  .bolt-dim polyline{fill:none; stroke:var(--purple); stroke-width:2;
    filter:drop-shadow(0 0 3px var(--purple)); opacity:.7}
  .charge-bright{position:absolute; inset:0; z-index:1; overflow:hidden}
  .energy{position:absolute; top:0; bottom:0; left:-200%; width:300%;
    background:repeating-linear-gradient(90deg, var(--purple) 0%, var(--magenta) 30%,
      var(--magenta-2) 48%, var(--yellow) 66.667%);
    animation:flow 1.1s linear infinite; opacity:.9; will-change:transform;
    box-shadow:inset 0 0 18px rgba(255,230,0,.4)}
  @keyframes flow{to{transform:translate3d(66.667%,0,0)}}
  .bolt-bright{position:absolute; inset:0; width:100%; height:100%}
  .bolt-bright .glow{fill:none; stroke:var(--magenta-2); stroke-width:5; opacity:.25;
    filter:drop-shadow(0 0 4px var(--magenta))}
  .bolt-bright .core{fill:none; stroke:var(--yellow); stroke-width:2.4; stroke-linecap:round;
    filter:drop-shadow(0 0 5px var(--yellow))}
  @keyframes flowD{to{stroke-dashoffset:-210}}
  @keyframes crackle{0%{opacity:1}50%{opacity:.5}100%{opacity:.85}}
  .charge-empty{position:absolute; inset:0; z-index:2; transform:scaleX(var(--empty-ratio));
    transform-origin:right center; transition:transform .25s var(--ease); will-change:transform;
    background:linear-gradient(180deg,#120623,#0c0418)}
  .charge-surge{position:absolute; inset:0; z-index:4; opacity:0; pointer-events:none;
    border-radius:12px;
    box-shadow:0 0 26px rgba(255,230,0,.7), inset 0 0 18px rgba(226,59,255,.5);
    transition:opacity .12s; will-change:opacity}
  .charge.surge .charge-surge{opacity:1}
  .bolt-tip-track{position:absolute; inset:0; z-index:4; transform:translate3d(var(--tip-offset),0,0);
    transition:transform .25s var(--ease); will-change:transform; pointer-events:none}
  .bolt-tip{position:absolute; top:50%; right:0; transform:translate(50%,-50%) scale(0);
    font-size:1.3rem; filter:drop-shadow(0 0 8px var(--yellow));
    animation:tipFlick .18s steps(2) infinite}
  .bolt-tip-track.on .bolt-tip{transform:translate(50%,-50%) scale(1)}
  @keyframes tipFlick{50%{opacity:.6}}
  .next-label{font-size:.58rem; color:var(--muted); letter-spacing:2px; margin-top:8px}

  .milestone{font-size:2rem; min-height:2.4rem; margin-top:4px}
  .milestone.bump{animation:bump .45s var(--ease)}
  @keyframes bump{0%,100%{transform:scale(1)}45%{transform:scale(1.6) rotate(8deg)}}

  .rank-panel{position:relative; width:100%; margin-top:24px; background:var(--surface);
    border:2px solid transparent; border-radius:16px; padding:16px 18px;
    box-shadow:0 0 20px rgba(255,200,0,.22), inset 0 0 20px rgba(123,44,255,.12)}
  .rank-panel::before{content:""; position:absolute; inset:0; border-radius:16px; padding:2px;
    background:linear-gradient(110deg,#6b4e00,#ffcf2e,#fff4bd,#ffcf2e,#6b4e00);
    background-size:300% 100%;
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    animation:goldShimmer 2.4s ease-in-out infinite; will-change:opacity; pointer-events:none}
  @keyframes goldShimmer{50%{opacity:.45}}
  .rank-head h2{font-weight:900; font-size:.8rem; letter-spacing:3px; color:var(--magenta);
    text-shadow:0 0 10px rgba(226,59,255,.6); margin-bottom:12px}
  .rank-item{display:flex; align-items:center; gap:10px; padding:7px 0; font-size:12px;
    letter-spacing:.5px; border-bottom:1px solid rgba(226,59,255,.1)}
  .rank-item:last-child{border-bottom:none}
  .rank-num{width:28px; text-align:center; font-weight:900; color:var(--muted)}
  .rank-name{flex:1; color:var(--text)}
  .rank-score{font-weight:900; color:var(--yellow); text-shadow:0 0 8px rgba(255,230,0,.5)}
  /* top 3: gold gradient, intensity steps down 1 -> 2 -> 3 */
  .rank-1,.rank-2,.rank-3{border-bottom:none; border-radius:10px; padding:9px 8px; margin:4px 0}
  .rank-1{background:linear-gradient(90deg, rgba(255,206,0,.34), rgba(255,170,0,.05));
    box-shadow:inset 0 0 16px rgba(255,200,0,.30)}
  .rank-2{background:linear-gradient(90deg, rgba(255,206,0,.22), rgba(255,170,0,.04));
    box-shadow:inset 0 0 13px rgba(255,200,0,.2)}
  .rank-3{background:linear-gradient(90deg, rgba(255,206,0,.13), rgba(255,170,0,.03));
    box-shadow:inset 0 0 11px rgba(255,200,0,.14)}
  .rank-1 .rank-name,.rank-2 .rank-name,.rank-3 .rank-name{color:#ffe9a8; font-weight:900;
    text-shadow:0 0 8px rgba(255,200,0,.5)}
  .rank-1 .rank-score,.rank-2 .rank-score,.rank-3 .rank-score{color:#ffd700;
    text-shadow:0 0 10px rgba(255,215,0,.85)}
  .rank-1 .rank-num,.rank-2 .rank-num,.rank-3 .rank-num{font-size:17px}
  .rank-1 .rank-num{font-size:19px}
  .rank-1 .rank-name{font-size:13px}
  .refresh{margin-top:12px; width:100%; padding:9px; border-radius:10px; cursor:pointer;
    background:none; border:1.5px solid var(--line); color:var(--muted); font:inherit;
    font-weight:700; font-size:11px; letter-spacing:2px; transition:border-color .15s,color .15s,box-shadow .15s}
  .refresh:hover{border-color:var(--magenta); color:var(--text); box-shadow:0 0 12px rgba(226,59,255,.4)}
  .server{font-size:10px; color:var(--muted); margin-top:8px; text-align:center; letter-spacing:1px; opacity:.85}
  .hint{margin-top:18px; font-size:11px; color:var(--muted); letter-spacing:1.5px}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); border:1px solid var(--magenta); color:var(--text);
    padding:10px 18px; border-radius:99px; font-size:11px; font-weight:700; letter-spacing:1px;
    opacity:0; transition:opacity .25s, transform .25s var(--ease); z-index:80; pointer-events:none;
    box-shadow:0 0 18px rgba(226,59,255,.5)}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){*{animation:none !important}}
  /* ===== DANGER / WARNING PANEL (magenta-dominant; text left, full photo right) ===== */
  .danger{position:relative; width:100%; margin-top:26px; border-radius:14px; overflow:hidden;
    display:flex; flex-direction:row; align-items:center; gap:12px; padding:20px 14px;
    background:radial-gradient(120% 120% at 50% 0%, #3d0838, #1d0420 74%);
    border:1.8px solid #e23bff;
    box-shadow:0 0 26px rgba(226,59,255,.65), inset 0 0 32px rgba(226,59,255,.24)}
  .danger-glow{position:absolute; inset:0; z-index:1; pointer-events:none;
    box-shadow:inset 0 0 38px rgba(255,45,149,.42);
    opacity:.28; animation:dangerPulse 1.5s ease-in-out infinite; will-change:opacity}
  @keyframes dangerPulse{50%{opacity:1}}
  .danger::before,.danger::after{content:""; position:absolute; left:0; right:0; height:9px; z-index:3;
    background:repeating-linear-gradient(45deg,#e23bff 0 14px,#ff2d95 14px 26px,#e23bff 26px 38px,#ff1f3d 38px 44px); opacity:.95}
  .danger::before{top:0}
  .danger::after{bottom:0}
  /* warning text — left side, enlarged */
  .danger-text{flex:1 1 auto; min-width:0; text-align:left; position:relative; z-index:4; padding:2px 2px 2px 6px}
  /* whole arm photo — right side, aspect kept, height matches the ranking panel */
  .danger-photo{position:relative; z-index:2; flex:0 0 auto; height:200px; aspect-ratio:2002/3088; border-radius:10px; pointer-events:none;
    background-position:center; background-size:cover; background-repeat:no-repeat;
    box-shadow:0 0 16px rgba(226,59,255,.55), inset 0 0 0 1px rgba(226,59,255,.45);
    filter:grayscale(.12) contrast(1.05) saturate(1.2) brightness(.98);
    animation:photoThrob 1.8s ease-in-out infinite; will-change:opacity}
  @keyframes photoThrob{50%{opacity:.86}}
  .danger-msg{font-weight:900; line-height:1.5; color:#ffe3f7; letter-spacing:.5px;
    font-size:clamp(1rem,4.6vw,1.25rem); text-shadow:0 0 4px #1d0420,0 0 10px rgba(226,59,255,.9)}
  .danger-msg .hit{color:#e23bff; text-shadow:0 0 6px #1d0420,0 0 12px #e23bff,0 0 28px #ff2d95}
  .danger-msg .yacha{display:inline-block; white-space:nowrap; margin-top:12px;
    font-size:clamp(1.2rem,6vw,1.75rem); color:#ffe600; letter-spacing:1px;
    text-shadow:0 0 6px #1d0420,0 0 12px #ffe600,0 0 26px #ffd400,0 0 44px #ff8a00;
    transform:rotate(-3deg); animation:yachaShake .08s steps(2) infinite; will-change:transform}
  @keyframes yachaShake{0%,100%{transform:rotate(-3deg) translate(0,0)}50%{transform:rotate(-3deg) translate(2px,-2px)}}
</style>
</head>
<body>
<div class="bg-bolt" aria-hidden="true">
  <svg viewBox="2.6 0 10.8 16" preserveAspectRatio="xMaxYMin meet" xmlns="http://www.w3.org/2000/svg">
    <path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/>
  </svg>
</div>
<div class="scan"></div>
<div class="stage">
  <h1 class="title" aria-label="POPKEMON"><span class="t-pop" data-text="PO">PO</span><span class="t-bigP">P</span><span class="t-ket">KEM</span><span class="t-ball" aria-hidden="true"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="ballClip"><circle cx="50" cy="50" r="47"/></clipPath></defs><g clip-path="url(#ballClip)"><rect x="0" y="50" width="100" height="50" fill="#f3e6ff"/><rect x="0" y="0" width="100" height="50" fill="#6a2bb5"/><circle cx="30" cy="24" r="9" fill="#ff2bd6"/><circle cx="67" cy="30" r="6" fill="#ff2bd6"/><circle cx="52" cy="13" r="4.5" fill="#e23bff"/><path d="M38 34V14h5l7 10 7-10h5v20h-5V22l-7 9-7-9v12z" fill="#fff" transform="translate(10 4.8) scale(.8)"/><rect x="0" y="44" width="100" height="12" fill="#1a0a2e"/></g><circle cx="50" cy="50" r="47" fill="none" stroke="#1a0a2e" stroke-width="5"/><circle cx="50" cy="50" r="14" fill="#1a0a2e"/><circle cx="50" cy="50" r="10" fill="#f3e6ff"/><circle cx="50" cy="50" r="5" fill="#fff" stroke="#1a0a2e" stroke-width="1.6"/></svg></span><span class="t-ket">N</span></h1>
  <div class="subtitle">TAP CLICKER</div>
  <div class="credit">Developed by Yena Chang</div>

  <div class="name-row">
    <input type="text" id="playerName" placeholder="TRAINER NAME" maxlength="10" aria-label="trainer name">
    <button id="saveName">SET</button>
  </div>

  <div class="stats">
    <div class="chip hero"><div class="label">TOTAL POPS</div><div class="value" id="total">0</div></div>
    <div class="chip"><div class="label">POPS / SEC</div><div class="value" id="pps">0</div></div>
    <div class="chip"><div class="label">MY RANK</div><div class="value" id="myRank">-</div></div>
  </div>

  <div class="arena" id="arena">
    <div class="platform"></div>

  // ── 기기 고유 ID (한 기기 = 한 사람) ──
  // 닉네임이 아니라 이 값으로 사람을 구분한다.
  // 처음 방문하면 새로 발급하고 localStorage에 저장 → 다음에 와도 같은 사람으로 인식.
  function makeUserId(){
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'u-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,10);
  }
  let USER_ID = localStorage.getItem('popkemon_user_id');
  if(!USER_ID){ USER_ID = makeUserId(); localStorage.setItem('popkemon_user_id', USER_ID); }

  let count = 0;
  let playerName = localStorage.getItem('popkemon_name') || 'TRAINER';
  let recentPops = [];
  let popTimer = null, surgeTimer = null;

  const $ = id => document.getElementById(id);
  const totalEl=$('total'), ppsEl=$('pps'), myRankEl=$('myRank');
  const milestoneEl=$('milestone'), nextLabel=$('nextLabel');
  const monBtn=$('monBtn'), toast=$('toast');
  const charge=$('charge'), boltTip=$('boltTip');
  $('playerName').value = playerName;

  const milestones=[[10,'\u26A1'],[50,'\uD83D\uDD25'],[100,'\uD83D\uDC9C'],[500,'\uD83D\uDC7E'],[1000,'\uD83C\uDF1F'],[5000,'\uD83D\uDC51']];
  const getMilestone=n=>{let r='';for(const[t,e]of milestones)if(n>=t)r=e;return r;};

  // 현재 count에 맞춰 충전 게이지/다음 목표/마일스톤을 다시 그린다 (점수 복원 시 사용)
  function applyGauge(){
    const next=milestones.find(([t])=>t>count);
    const prev=[...milestones].reverse().find(([t])=>t<=count);
    let pct;
    if(next){
      const lo=prev?prev[0]:0; pct=Math.min(((count-lo)/(next[0]-lo))*100,100);
      nextLabel.textContent=(next[0]-count)+' POPS TO '+next[1];
    }else{ pct=100; nextLabel.textContent='MAX CHARGE \uD83D\uDC51'; }
    charge.style.setProperty('--empty-ratio',1-pct/100);
    charge.style.setProperty('--tip-offset',(pct-100)+'%'); boltTip.classList.add('on');
    const em=getMilestone(count);
    if(em) milestoneEl.textContent=em;
  }

  function showToast(msg){ toast.textContent=msg; toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),1400); }
  function setName(){
    const v=$('playerName').value.trim();
    if(v){playerName=v; localStorage.setItem('popkemon_name',v); showToast('NAME SET: '+v); fetchMyRank();}
  }
  $('saveName').addEventListener('click',setName);
  $('playerName').addEventListener('keydown',e=>{ if(e.key==='Enter') setName(); });

  function spawnText(x,y){
    const texts=['POP!','POW!','ZAP!','CRIT!','BZZT!','SURGE!'];
    const el=document.createElement('div');
    el.className='pop-text'; el.textContent=texts[Math.floor(Math.random()*texts.length)];
    el.style.left=x+'px'; el.style.top=(y-10)+'px';
    document.body.appendChild(el); setTimeout(()=>el.remove(),700);
  }
  function spawnSparks(x,y,n){
    for(let i=0;i<(n||6);i++){
      const s=document.createElement('div'); s.className='spark';
      const a=Math.random()*Math.PI*2, d=30+Math.random()*45;
      s.style.left=x+'px'; s.style.top=y+'px';
      s.style.setProperty('--dx',Math.cos(a)*d+'px');
      s.style.setProperty('--dy',Math.sin(a)*d+'px');
      s.style.background= Math.random()>.5 ? 'var(--yellow)' : 'var(--magenta-2)';
      document.body.appendChild(s); setTimeout(()=>s.remove(),500);
    }
  }

  async function sendScore(){
    try{ await fetch(API+'/pop',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id:USER_ID, name:playerName, count})});
      $('serverStatus').textContent='ONLINE'; fetchMyRank();
    }catch(e){ $('serverStatus').textContent='OFFLINE'; }
  }
  // 서버 기록을 게임에 반영. count는 절대 줄지 않게 MAX로 합침.
  function applyRecord(d, restoreName){
    if(!d || d.error) return;
    if(typeof d.count === 'number' && d.count > count){
      count = d.count;
      totalEl.textContent = count.toLocaleString();
      applyGauge();
    }
    if(restoreName && d.name){
      playerName = d.name;
      $('playerName').value = d.name;
      localStorage.setItem('popkemon_name', d.name);
    }
    if(d.rank) myRankEl.textContent = '#' + d.rank;
  }
  async function fetchMyRank(){
    try{const res=await fetch(API+'/ranking/'+encodeURIComponent(USER_ID));
      applyRecord(await res.json(), false);}catch(e){}
  }
  // 앱 진입 시 한 번: 내 저장된 점수와 닉네임을 받아 게임에 복원
  async function loadMyRecord(){
    try{const res=await fetch(API+'/ranking/'+encodeURIComponent(USER_ID));
      applyRecord(await res.json(), true); $('serverStatus').textContent='ONLINE';}catch(e){}
  }
  async function fetchRanking(){
    try{
      const res=await fetch(API+'/ranking'); const d=await res.json();
      const list=$('rankList');
      if(!d.ranking||!d.ranking.length){list.innerHTML='NO POPS YET';return;}
      const medals=['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'];
      list.className='';
      list.innerHTML=d.ranking.map((it,i)=>
        '<div class="rank-item rank-'+(i+1)+'"><span class="rank-num">'+(medals[i]||it.rank)+
        '</span><span class="rank-name">'+it.name+'</span><span class="rank-score">'+
        it.count.toLocaleString()+'</span></div>').join('');
      $('serverStatus').textContent=d.total_players+' TRAINERS ONLINE';
      syncDangerPhoto();
    }catch(e){ $('rankList').textContent='RUN server.py & REFRESH'; }
  }
  $('refreshBtn').addEventListener('click',fetchRanking);

  function pop(x,y){
    count++;
    totalEl.textContent=count.toLocaleString();
    recentPops.push(Date.now());

    // charge gauge
    const next=milestones.find(([t])=>t>count);
    const prev=[...milestones].reverse().find(([t])=>t<=count);
    let pct;
    if(next){
      const lo=prev?prev[0]:0; pct=Math.min(((count-lo)/(next[0]-lo))*100,100);
      nextLabel.textContent=(next[0]-count)+' POPS TO '+next[1];
    }else{ pct=100; nextLabel.textContent='MAX CHARGE \uD83D\uDC51'; }
    charge.style.setProperty('--empty-ratio',1-pct/100);
    charge.style.setProperty('--tip-offset',(pct-100)+'%'); boltTip.classList.add('on');
    // electric surge flash
    charge.classList.add('surge');
    if(surgeTimer) clearTimeout(surgeTimer);
    surgeTimer=setTimeout(()=>charge.classList.remove('surge'),120);

    const em=getMilestone(count);
    if(em && milestoneEl.textContent!==em){
      milestoneEl.textContent=em;
      milestoneEl.classList.remove('bump'); void milestoneEl.offsetWidth;
      milestoneEl.classList.add('bump');
      const r=charge.getBoundingClientRect();
      spawnSparks(r.left+r.width*pct/100, r.top+r.height/2, 14); // bolt burst at tip
    }

    monBtn.classList.add('pop');
    if(popTimer) clearTimeout(popTimer);
    popTimer=setTimeout(()=>monBtn.classList.remove('pop'),100);

    spawnText(x,y); spawnSparks(x,y);
    if(count%5===0) sendScore();
  }

  // ONE pop per physical press. No keyboard, no auto-repeat on hold.
  monBtn.addEventListener('pointerdown',e=>{ e.preventDefault(); pop(e.clientX,e.clientY); }, {passive:false});

  setInterval(()=>{const now=Date.now(); recentPops=recentPops.filter(t=>now-t<1000);
    const pps=recentPops.length;
    if(ppsEl.textContent!==String(pps)) ppsEl.textContent=pps;},200);

  document.addEventListener('dblclick', e=>e.preventDefault(), {passive:false});

  // iOS 사파리 핀치/제스처 줌 차단 (두 손가락 줌으로 인한 화면 이동 방지)
  document.addEventListener('gesturestart', e => e.preventDefault(), false);
  document.addEventListener('gesturechange', e => e.preventDefault(), false);
  document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  document.addEventListener('touchmove', e => { if (e.scale !== 1) e.preventDefault(); }, { passive: false });

  // 경고 사진 높이를 랭킹 패널 상하폭에 맞춤 (비율은 CSS aspect-ratio가 유지)
  const dangerPhoto = document.querySelector('.danger-photo');
  const rankPanelEl = document.querySelector('.rank-panel');
  function syncDangerPhoto(){
    if(!dangerPhoto || !rankPanelEl) return;
    const h = Math.max(160, Math.min(rankPanelEl.offsetHeight, 260));
    dangerPhoto.style.height = h + 'px';
  }
  window.addEventListener('resize', syncDangerPhoto);
  syncDangerPhoto();

  fetchRanking(); loadMyRecord();
  setInterval(fetchRanking,30000);

  // 배경 번개: 스크롤에 맞춰 부드럽게 따라 움직이는 패럴랙스
  // 목표값으로 매 프레임 조금씩(lerp) 다가가서 올릴 때/내릴 때 모두 스무스하게.
  const bgBolt = document.querySelector('.bg-bolt');
  const PARALLAX = 0.18;           // 스크롤 대비 번개 이동 비율 (작을수록 깊은 느낌)
  let targetY = 0, curY = 0, rafId = null;
  function boltLoop(){
    curY += (targetY - curY) * 0.12;
    bgBolt.style.transform = 'translate3d(0,' + curY.toFixed(2) + 'px,0)';
    if(Math.abs(targetY - curY) > 0.3){ rafId = requestAnimationFrame(boltLoop); }
    else { curY = targetY; bgBolt.style.transform = 'translate3d(0,' + targetY + 'px,0)'; rafId = null; }
  }
  window.addEventListener('scroll', ()=>{
    targetY = (window.scrollY || window.pageYOffset || 0) * PARALLAX;
    if(rafId === null) rafId = requestAnimationFrame(boltLoop);
  }, {passive:true});
</script>
</body>
</html>
