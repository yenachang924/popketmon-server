<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POPKETMON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#080410; --bg-1:#11061f;
    --surface:#190a2b; --surface-2:#23103c; --line:#3d1b66;
    --magenta:#e23bff; --magenta-2:#ff2bd6; --purple:#7b2cff; --violet:#2a0a4a;
    --yellow:#ffe600; --yellow-soft:#ffd400;
    --text:#f3e6ff; --muted:#a07ccf;
    --ease:cubic-bezier(.34,1.56,.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Orbitron',sans-serif; color:var(--text);
    background:var(--bg-0); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:34px 16px 60px; overflow-x:hidden;
    user-select:none; -webkit-user-select:none;
    font-variant-numeric:tabular-nums; letter-spacing:.5px;
  }
  /* cyberpunk atmosphere: neon glows + perspective grid floor */
  body::before{
    content:""; position:fixed; inset:0; z-index:-3;
    background:
      radial-gradient(60% 45% at 50% 6%, rgba(226,59,255,.22), transparent 70%),
      radial-gradient(55% 45% at 88% 78%, rgba(123,44,255,.20), transparent 72%),
      radial-gradient(45% 40% at 8% 70%, rgba(255,230,0,.06), transparent 70%),
      linear-gradient(180deg,var(--bg-1),var(--bg-0));
  }
  body::after{
    content:""; position:fixed; left:-20%; right:-20%; bottom:-10%; height:55%;
    z-index:-3; pointer-events:none; opacity:.35;
    background-image:
      linear-gradient(90deg, rgba(226,59,255,.5) 1px, transparent 1px),
      linear-gradient(0deg, rgba(226,59,255,.4) 1px, transparent 1px);
    background-size:42px 42px;
    transform:perspective(340px) rotateX(64deg);
    transform-origin:bottom center;
    mask-image:linear-gradient(to top, #000, transparent);
    -webkit-mask-image:linear-gradient(to top, #000, transparent);
  }
  .scan{position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply; opacity:.5}

  /* canary-yellow lightning watermark: enters off the top-right corner, sweeps down-left */
  .bg-bolt{position:fixed; top:-6vh; right:-6vw; width:90vmax; height:90vmax;
    z-index:-2; opacity:.2; pointer-events:none;
    filter:drop-shadow(0 0 60px rgba(255,239,0,.18))}
  .bg-bolt svg{width:100%; height:100%; display:block}
  .bg-bolt path{fill:#ffef00}

  .stage{width:100%; max-width:380px; display:flex; flex-direction:column; align-items:center; position:relative}

  /* glitchy neon title */
  .title{position:relative; display:flex; justify-content:center; align-items:baseline;
    white-space:nowrap; font-weight:900; font-size:clamp(2.6rem,12vw,3.6rem);
    line-height:1; letter-spacing:3px}
  .title span{position:relative; display:inline-block}

  /* KETMON: steady magenta neon (original project vibe) */
  .t-ket{color:var(--magenta);
    text-shadow:0 0 8px rgba(226,59,255,.85), 0 0 26px rgba(123,44,255,.65), 0 0 40px rgba(226,59,255,.35)}

  /* POP: white, high-energy POPcat-style glitch */
  .t-pop{color:#fff;
    text-shadow:0 0 8px rgba(255,255,255,.95), 0 0 22px rgba(226,59,255,.55);
    animation:popTwitch .26s steps(2) infinite}
  .t-pop::before,.t-pop::after{content:attr(data-text); position:absolute; inset:0; pointer-events:none}
  .t-pop::before{color:#fff; text-shadow:0 0 6px #fff;
    animation:popWhite 1.1s steps(1) infinite}                 /* white glitch */
  .t-pop::after{color:var(--magenta-2); opacity:.9;
    animation:popChroma .9s steps(1) infinite}                 /* chromatic energy */
  @keyframes popTwitch{0%,100%{transform:translate(0,0)}50%{transform:translate(.5px,-.5px)}}
  @keyframes popWhite{
    0%,9%,100%{clip-path:inset(0 0 100% 0);transform:translate(0)}
    11%{clip-path:inset(0 0 58% 0);transform:translate(-5px,-2px)}
    16%{clip-path:inset(28% 0 38% 0);transform:translate(6px,1px)}
    21%{clip-path:inset(64% 0 0 0);transform:translate(-4px,2px)}
    23%{clip-path:inset(0 0 100% 0)}
    44%{clip-path:inset(8% 0 70% 0);transform:translate(5px,-1px)}
    48%{clip-path:inset(0 0 100% 0)}
    63%{clip-path:inset(42% 0 22% 0);transform:translate(-6px,0)}
    66%{clip-path:inset(0 0 100% 0)}
    84%{clip-path:inset(15% 0 55% 0);transform:translate(4px,2px)}
    88%{clip-path:inset(0 0 100% 0)}}
  @keyframes popChroma{
    0%,12%,100%{clip-path:inset(100% 0 0 0);transform:translate(0)}
    14%{clip-path:inset(18% 0 52% 0);transform:translate(5px,1px)}
    19%{clip-path:inset(56% 0 16% 0);transform:translate(-5px,-1px)}
    22%{clip-path:inset(100% 0 0 0)}
    52%{clip-path:inset(0 0 74% 0);transform:translate(4px,2px)}
    56%{clip-path:inset(100% 0 0 0)}
    78%{clip-path:inset(34% 0 40% 0);transform:translate(-4px,1px)}
    82%{clip-path:inset(100% 0 0 0)}}
  .subtitle{font-size:.62rem; letter-spacing:5px; color:var(--muted); margin-top:8px}

  .name-row{display:flex; gap:8px; margin:18px 0 4px}
  .name-row input{padding:9px 14px; border:1.5px solid var(--line); border-radius:10px;
    background:var(--surface); color:var(--text); font:inherit; font-size:12px; outline:none;
    width:150px; letter-spacing:1px; transition:border-color .15s, box-shadow .15s}
  .name-row input::placeholder{color:var(--muted)}
  .name-row input:focus{border-color:var(--magenta); box-shadow:0 0 12px rgba(226,59,255,.5)}
  .name-row button{padding:9px 16px; border-radius:10px; cursor:pointer;
    background:var(--surface-2); color:var(--text); font:inherit; font-weight:700; font-size:12px;
    letter-spacing:1px; border:1.5px solid var(--magenta); transition:transform .12s var(--ease), box-shadow .15s}
  .name-row button:hover{box-shadow:0 0 14px rgba(226,59,255,.6)}
  .name-row button:active{transform:scale(.94)}

  .stats{display:flex; gap:10px; width:100%; margin:18px 0 6px}
  .chip{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:12px 6px; text-align:center; box-shadow:inset 0 0 16px rgba(123,44,255,.15)}
  .chip.hero{flex:1.4; border-color:var(--magenta); box-shadow:0 0 16px rgba(226,59,255,.3), inset 0 0 18px rgba(226,59,255,.12)}
  .chip .label{font-size:.52rem; letter-spacing:2px; color:var(--muted)}
  .chip .value{font-weight:900; font-size:1.4rem; margin-top:4px; line-height:1}
  .chip.hero .value{font-size:2rem; color:var(--yellow); text-shadow:0 0 14px rgba(255,230,0,.6)}

  .arena{position:relative; width:260px; height:250px; margin:12px 0 2px;
    display:flex; align-items:center; justify-content:center}
  .platform{position:absolute; bottom:16px; width:180px; height:40px; border-radius:50%;
    background:radial-gradient(closest-side, rgba(226,59,255,.6), rgba(226,59,255,0) 75%);
    filter:blur(2px); animation:platformPulse 2.4s ease-in-out infinite}
  @keyframes platformPulse{50%{transform:scale(1.08); opacity:.75}}
  .tap-ring{position:absolute; width:200px; height:200px; border-radius:50%;
    border:2px dashed rgba(255,230,0,.5);
    animation:ringSpin 9s linear infinite, ringBreathe 2.4s ease-in-out infinite; pointer-events:none}
  @keyframes ringSpin{to{transform:rotate(360deg)}}
  @keyframes ringBreathe{50%{opacity:.35; transform:scale(1.04) rotate(180deg)}}

  .mon-btn{position:relative; width:228px; height:228px; border:none; background:none;
    cursor:pointer; padding:0; outline:none; -webkit-tap-highlight-color:transparent}
  .mon-img{width:100%; height:100%; object-fit:contain;
    filter:drop-shadow(0 10px 18px rgba(0,0,0,.55)) drop-shadow(0 0 14px rgba(226,59,255,.35));
    animation:idleFloat 3s ease-in-out infinite; transition:transform .08s var(--ease); pointer-events:none}
  @keyframes idleFloat{50%{transform:translateY(-10px)}}
  .mon-btn.pop .mon-img{animation:none; transform:scale(.88) rotate(-3deg)}

  .pop-text{position:fixed; z-index:50; pointer-events:none; white-space:nowrap;
    font-weight:900; font-size:1.05rem; letter-spacing:1px; color:var(--yellow);
    text-shadow:0 0 10px rgba(255,230,0,.8); animation:popUp .7s ease-out forwards}
  @keyframes popUp{0%{opacity:1; transform:translate(-50%,0) scale(.8)}
    100%{opacity:0; transform:translate(-50%,-70px) scale(1.4)}}
  .spark{position:fixed; z-index:49; width:7px; height:7px; border-radius:50%;
    pointer-events:none; animation:spark .5s ease-out forwards}
  @keyframes spark{to{opacity:0; transform:translate(var(--dx),var(--dy)) scale(.2)}}

  /* ===== ELECTRIC CHARGE GAUGE (lightning, not a plain bar) ===== */
  .charge{position:relative; width:100%; height:46px; margin-top:20px; --barw:344px}
  .charge.surge .charge-track{box-shadow:0 0 26px rgba(255,230,0,.7), inset 0 0 18px rgba(226,59,255,.5)}
  .charge.surge .energy{filter:brightness(1.6)}
  .charge-track{position:absolute; inset:0; border-radius:12px; overflow:hidden;
    background:linear-gradient(180deg,#120623,#0c0418);
    border:1.5px solid var(--line);
    box-shadow:inset 0 0 14px rgba(123,44,255,.35); transition:box-shadow .12s}
  .bolt-dim{position:absolute; inset:0; width:100%; height:100%; opacity:.5}
  .bolt-dim polyline{fill:none; stroke:var(--purple); stroke-width:2;
    filter:drop-shadow(0 0 3px var(--purple)); opacity:.7}
  .charge-fill{position:absolute; top:0; left:0; height:100%; width:0%;
    overflow:hidden; border-radius:12px 0 0 12px; transition:width .25s var(--ease)}
  .charge-bright{position:absolute; top:0; left:0; height:100%; width:var(--barw)}
  .energy{position:absolute; inset:0;
    background:linear-gradient(90deg, var(--purple), var(--magenta) 45%, var(--magenta-2) 70%, var(--yellow));
    background-size:200% 100%; animation:flow 1.1s linear infinite; opacity:.9;
    box-shadow:inset 0 0 18px rgba(255,230,0,.4)}
  @keyframes flow{to{background-position:-200% 0}}
  .bolt-bright{position:absolute; inset:0; width:100%; height:100%}
  .bolt-bright .glow{fill:none; stroke:var(--magenta-2); stroke-width:6; opacity:.8;
    filter:blur(2px) drop-shadow(0 0 6px var(--magenta)); animation:crackle .25s steps(2) infinite}
  .bolt-bright .core{fill:none; stroke:var(--yellow); stroke-width:2.4; stroke-linecap:round;
    stroke-dasharray:14 7; filter:drop-shadow(0 0 5px var(--yellow));
    animation:flowD .5s linear infinite, crackle .22s steps(2) infinite}
  @keyframes flowD{to{stroke-dashoffset:-210}}
  @keyframes crackle{0%{opacity:1}50%{opacity:.5}100%{opacity:.85}}
  .bolt-tip{position:absolute; top:50%; left:0; transform:translate(-50%,-50%) scale(0);
    font-size:1.3rem; filter:drop-shadow(0 0 8px var(--yellow));
    transition:left .25s var(--ease); animation:tipFlick .18s steps(2) infinite}
  .bolt-tip.on{transform:translate(-50%,-50%) scale(1)}
  @keyframes tipFlick{50%{opacity:.6}}
  .next-label{font-size:.58rem; color:var(--muted); letter-spacing:2px; margin-top:8px}

  .milestone{font-size:2rem; min-height:2.4rem; margin-top:4px}
  .milestone.bump{animation:bump .45s var(--ease)}
  @keyframes bump{0%,100%{transform:scale(1)}45%{transform:scale(1.6) rotate(8deg)}}

  .rank-panel{width:100%; margin-top:24px; background:var(--surface);
    border:1px solid var(--line); border-radius:16px; padding:16px 18px;
    box-shadow:inset 0 0 20px rgba(123,44,255,.12)}
  .rank-head h2{font-weight:900; font-size:.8rem; letter-spacing:3px; color:var(--magenta);
    text-shadow:0 0 10px rgba(226,59,255,.6); margin-bottom:12px}
  .rank-item{display:flex; align-items:center; gap:10px; padding:7px 0; font-size:12px;
    letter-spacing:.5px; border-bottom:1px solid rgba(226,59,255,.1)}
  .rank-item:last-child{border-bottom:none}
  .rank-num{width:28px; text-align:center; font-weight:900; color:var(--muted)}
  .rank-name{flex:1; color:var(--text)}
  .rank-score{font-weight:900; color:var(--yellow); text-shadow:0 0 8px rgba(255,230,0,.5)}
  .rank-1 .rank-num,.rank-2 .rank-num,.rank-3 .rank-num{font-size:16px}
  .refresh{margin-top:12px; width:100%; padding:9px; border-radius:10px; cursor:pointer;
    background:none; border:1.5px solid var(--line); color:var(--muted); font:inherit;
    font-weight:700; font-size:11px; letter-spacing:2px; transition:border-color .15s,color .15s,box-shadow .15s}
  .refresh:hover{border-color:var(--magenta); color:var(--text); box-shadow:0 0 12px rgba(226,59,255,.4)}
  .server{font-size:10px; color:var(--muted); margin-top:8px; text-align:center; letter-spacing:1px; opacity:.85}
  .hint{margin-top:18px; font-size:11px; color:var(--muted); letter-spacing:1.5px}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); border:1px solid var(--magenta); color:var(--text);
    padding:10px 18px; border-radius:99px; font-size:11px; font-weight:700; letter-spacing:1px;
    opacity:0; transition:opacity .25s, transform .25s var(--ease); z-index:80; pointer-events:none;
    box-shadow:0 0 18px rgba(226,59,255,.5)}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){*{animation:none !important}}
</style>
</head>
<body>
<div class="bg-bolt" aria-hidden="true">
  <svg viewBox="2.6 0 10.8 16" preserveAspectRatio="xMaxYMin meet" xmlns="http://www.w3.org/2000/svg">
    <path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/>
  </svg>
</div>
<div class="scan"></div>
<div class="stage">
  <h1 class="title"><span class="t-pop" data-text="POP">POP</span><span class="t-ket">KETMON</span></h1>
  <div class="subtitle">TAP CLICKER</div>

  <div class="name-row">
    <input type="text" id="playerName" placeholder="TRAINER NAME" maxlength="10" aria-label="trainer name">
    <button id="saveName">SET</button>
  </div>

  <div class="stats">
    <div class="chip hero"><div class="label">TOTAL POPS</div><div class="value" id="total">0</div></div>
    <div class="chip"><div class="label">POPS / SEC</div><div class="value" id="pps">0</div></div>
    <div class="chip"><div class="label">MY RANK</div><div class="value" id="myRank">-</div></div>
  </div>

  <div class="arena" id="arena">
    <div class="platform"></div>
    <div class="tap-ring"></div>
    <button class="mon-btn" id="monBtn" aria-label="pop the mon">
      <img class="mon-img" id="monImg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAfQAAAH0CAYAAADL1t+KAAEAAElEQVR4nOy9eZwcV3Uv/r23qnrf90Wj0ej0eez0e7fbe7e63W57e+22nU7C7d7+7Ph0SVa07pAAAAAAElFTkSuQmCC" alt="popketmon">
    </button>
  </div>

  <!-- electric charge gauge -->
  <div class="charge" id="charge">
    <div class="charge-track">
      <svg class="bolt-dim" viewBox="0 0 400 44" preserveAspectRatio="none">
        <polyline points="0,22 24,10 44,30 70,8 92,26 120,12 150,32 180,9 210,28 240,14 270,30 300,10 330,26 360,12 388,24 400,20"/></svg>
      <div class="charge-fill" id="chargeFill">
        <div class="charge-bright">
          <div class="energy"></div>
          <svg class="bolt-bright" viewBox="0 0 400 44" preserveAspectRatio="none">
            <polyline class="glow" points="0,22 24,10 44,30 70,8 92,26 120,12 150,32 180,9 210,28 240,14 270,30 300,10 330,26 360,12 388,24 400,20"/>
            <polyline class="core" points="0,22 24,10 44,30 70,8 92,26 120,12 150,32 180,9 210,28 240,14 270,30 300,10 330,26 360,12 388,24 400,20"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="bolt-tip" id="boltTip">&#9889;</div>
  </div>
  <div class="next-label" id="nextLabel">CHARGE UP!</div>
  <div class="milestone" id="milestone"></div>

  <div class="rank-panel">
    <div class="rank-head"><h2>TRAINER RANKING</h2></div>
    <div id="rankList" class="server">CONNECTING...</div>
    <button class="refresh" id="refreshBtn">REFRESH</button>
    <div class="server" id="serverStatus"></div>
  </div>

  <div class="hint">TAP THE MON TO POP &mdash; 1 PER PRESS</div>
</div>
<div class="toast" id="toast"></div>

<script>
  const API = 'https://popketmon-server.onrender.com';

  // ===== 유저 고유키 (기기마다 딱 1개) =====
  function getUserId() {
    let id = localStorage.getItem('popkemon_uid');  // 저장된 키 꺼내기
    if (!id) {                                       // 없으면 = 이 기기 첫 방문
      id = crypto.randomUUID();                       // 새 고유키 생성
      localStorage.setItem('popkemon_uid', id);       // 기기에 저장
    }
    return id;
  }
  const USER_ID = getUserId();
  console.log('내 유저키:', USER_ID);  // F12 콘솔에서 확인용

  let count = parseInt(localStorage.getItem('popketmon_count')) || 0;
  let playerName = localStorage.getItem('popketmon_name') || 'TRAINER';
  let recentPops = [];
  let popTimer = null, surgeTimer = null;

  const $ = id => document.getElementById(id);
  const totalEl=$('total'), ppsEl=$('pps'), myRankEl=$('myRank');
  const milestoneEl=$('milestone'), nextLabel=$('nextLabel');
  const monBtn=$('monBtn'), toast=$('toast');
  const charge=$('charge'), chargeFill=$('chargeFill'), boltTip=$('boltTip');
  $('playerName').value = playerName;
  totalEl.textContent = count.toLocaleString();

  const milestones=[[10,'\u26A1'],[50,'\uD83D\uDD25'],[100,'\uD83D\uDC9C'],[500,'\uD83D\uDC7E'],[1000,'\uD83C\uDF1F'],[5000,'\uD83D\uDC51']];
  const getMilestone=n=>{let r='';for(const[t,e]of milestones)if(n>=t)r=e;return r;};

  // keep the lightning geometry at full-bar width so the fill reveals it left->right
  function sizeCharge(){ charge.style.setProperty('--barw', charge.clientWidth+'px'); }
  sizeCharge(); window.addEventListener('resize', sizeCharge);

  function showToast(msg){ toast.textContent=msg; toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),1400); }
  function setName(){
    const v=$('playerName').value.trim();
    if(v){playerName=v; localStorage.setItem('popketmon_name',v); showToast('NAME SET: '+v); sendScore(); fetchMyRank();}
  }
  $('saveName').addEventListener('click',setName);
  $('playerName').addEventListener('keydown',e=>{ if(e.key==='Enter') setName(); });

  function spawnText(x,y){
    const texts=['POP!','POW!','ZAP!','CRIT!','BZZT!','SURGE!'];
    const el=document.createElement('div');
    el.className='pop-text'; el.textContent=texts[Math.floor(Math.random()*texts.length)];
    el.style.left=x+'px'; el.style.top=(y-10)+'px';
    document.body.appendChild(el); setTimeout(()=>el.remove(),700);
  }
  function spawnSparks(x,y,n){
    for(let i=0;i<(n||6);i++){
      const s=document.createElement('div'); s.className='spark';
      const a=Math.random()*Math.PI*2, d=30+Math.random()*45;
      s.style.left=x+'px'; s.style.top=y+'px';
      s.style.setProperty('--dx',Math.cos(a)*d+'px');
      s.style.setProperty('--dy',Math.sin(a)*d+'px');
      s.style.background= Math.random()>.5 ? 'var(--yellow)' : 'var(--magenta-2)';
      document.body.appendChild(s); setTimeout(()=>s.remove(),500);
    }
  }

  // ===== 점수 전송: user_id를 같이 보내야 "식별"이 완성됨 =====
  async function sendScore(){
    try{ await fetch(API+'/pop',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id:USER_ID, name:playerName, count})});  // ← user_id 추가
      $('serverStatus').textContent='ONLINE'; fetchMyRank();
    }catch(e){ $('serverStatus').textContent='OFFLINE'; }
  }

  // ===== 내 등수: 이제 닉네임이 아니라 USER_ID로 조회 =====
  async function fetchMyRank(){
    try{const res=await fetch(API+'/ranking/'+encodeURIComponent(USER_ID));  // ← USER_ID로 변경
      const d=await res.json(); if(d.rank) myRankEl.textContent='#'+d.rank;}catch(e){}
  }

  async function fetchRanking(){
    try{
      const res=await fetch(API+'/ranking'); const d=await res.json();
      const list=$('rankList');
      if(!d.ranking||!d.ranking.length){list.innerHTML='NO POPS YET';return;}
      const medals=['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'];
      list.className='';
      list.innerHTML=d.ranking.map((it,i)=>
        '<div class="rank-item rank-'+(i+1)+'"><span class="rank-num">'+(medals[i]||it.rank)+
        '</span><span class="rank-name">'+it.name+'</span><span class="rank-score">'+
        it.count.toLocaleString()+'</span></div>').join('');
      $('serverStatus').textContent=d.total_players+' TRAINERS ONLINE';
    }catch(e){ $('rankList').textContent='SERVER WAKING UP... REFRESH'; }
  }
  $('refreshBtn').addEventListener('click',fetchRanking);

  function pop(x,y){
    count++;
    totalEl.textContent=count.toLocaleString();
    localStorage.setItem('popketmon_count', count);

    recentPops.push(Date.now());

    // charge gauge
    const next=milestones.find(([t])=>t>count);
    const prev=[...milestones].reverse().find(([t])=>t<=count);
    let pct;
    if(next){
      const lo=prev?prev[0]:0; pct=Math.min(((count-lo)/(next[0]-lo))*100,100);
      nextLabel.textContent=(next[0]-count)+' POPS TO '+next[1];
    }else{ pct=100; nextLabel.textContent='MAX CHARGE \uD83D\uDC51'; }
    chargeFill.style.width=pct+'%';
    boltTip.style.left=pct+'%'; boltTip.classList.add('on');
    // electric surge flash
    charge.classList.add('surge');
    if(surgeTimer) clearTimeout(surgeTimer);
    surgeTimer=setTimeout(()=>charge.classList.remove('surge'),120);

    const em=getMilestone(count);
    if(em && milestoneEl.textContent!==em){
      milestoneEl.textContent=em;
      milestoneEl.classList.remove('bump'); void milestoneEl.offsetWidth;
      milestoneEl.classList.add('bump');
      const r=charge.getBoundingClientRect();
      spawnSparks(r.left+r.width*pct/100, r.top+r.height/2, 14); // bolt burst at tip
    }

    monBtn.classList.add('pop');
    if(popTimer) clearTimeout(popTimer);
    popTimer=setTimeout(()=>monBtn.classList.remove('pop'),100);

    spawnText(x,y); spawnSparks(x,y);
    if(count%5===0) sendScore();
  }

  // ONE pop per physical press. No keyboard, no auto-repeat on hold.
  monBtn.addEventListener('pointerdown',e=>{ e.preventDefault(); pop(e.clientX,e.clientY); });

  setInterval(()=>{const now=Date.now(); recentPops=recentPops.filter(t=>now-t<1000);
    ppsEl.textContent=recentPops.length;},200);

  fetchRanking(); fetchMyRank();
  setInterval(fetchRanking,30000);
</script>
</body>
</html>
